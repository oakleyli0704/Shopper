<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國連線代購</title>
    <!-- 引入 Tailwind CSS 快速排版，提供高對比與卡片設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏區塊用的 class */
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

<script>
    // 👇👇👇 請將你剛剛拿到的 GAS 網頁應用程式網址貼在下方引號內 👇👇👇
    const API_URL = "https://script.google.com/macros/s/AKfycbwTrXfZTeLMm5_IKK5Zca5n0ZmRUm13lNk5rRkPku6w2YeROS0mVv2uzTV4rFo68u5qRQ/exec"; 
</script>

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">✈️ 韓國連線代購系統</h1>
        <button id="logoutBtn" class="hidden-view text-sm bg-blue-800 px-3 py-1 rounded" onclick="logout()">登出</button>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <!-- 畫面 1：登入與註冊區塊 -->
        <div id="login-view" class="bg-white p-6 rounded-lg shadow-md mt-10 border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">登入 / 註冊</h2>
            <input type="text" id="userName" placeholder="請輸入姓名" class="w-full p-3 mb-4 border rounded bg-gray-50 text-lg">
            <input type="password" id="userPwd" placeholder="請輸入密碼" class="w-full p-3 mb-6 border rounded bg-gray-50 text-lg">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold text-lg mb-4 active:bg-blue-700">登入</button>
            <button onclick="register()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold text-lg active:bg-green-700">首次使用？點此註冊</button>
            <p id="loginMessage" class="text-red-500 text-center mt-4 font-bold"></p>
        </div>

        <!-- 畫面 2：客人商品大廳 (User View) -->
        <div id="user-view" class="hidden-view">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-blue-600 pl-2">🛒 商品大廳</h2>
            <!-- 商品卡片範例 -->
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h3 class="font-bold text-lg text-blue-800">代餐奶昔-抹茶</h3>
                <p class="text-gray-600 mb-2">好喝不甜膩，代購熱銷款！</p>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-red-600 font-bold text-xl">NT$ 312</span>
                    <button class="bg-blue-100 text-blue-700 px-4 py-2 rounded font-bold">+ 加入清單</button>
                </div>
            </div>
            <!-- 客人可以繼續看到許願池和歷史訂單... -->
        </div>

        <!-- 畫面 3：管理員採購後台 (Admin View) -->
        <div id="admin-view" class="hidden-view">
            <h2 class="text-xl font-bold mb-4 text-red-600 border-l-4 border-red-600 pl-2">📦 現場採購總表 (管理員模式)</h2>
            
            <!-- 採購卡片範例 (包含加減號分配邏輯) -->
            <div class="bg-white p-4 rounded-lg shadow-md mb-4 border border-gray-200">
                <div class="flex justify-between items-end border-b pb-2 mb-3">
                    <div>
                        <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded">總需求: 13</span>
                        <h3 class="font-bold text-xl mt-1">代餐奶昔-抹茶</h3>
                    </div>
                    <div class="text-right">
                        <label class="text-sm text-gray-500 block">現場實買量</label>
                        <input type="number" value="8" class="w-20 p-2 border rounded text-center text-lg font-bold text-blue-600 bg-blue-50">
                    </div>
                </div>
                
                <!-- 子訂單分配 -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded">
                        <span class="font-bold text-gray-700">小明 (需 5)</span>
                        <div class="flex items-center">
                            <button class="bg-gray-300 px-3 py-1 rounded font-bold">-</button>
                            <span class="mx-4 font-bold text-lg">5</span>
                            <button class="bg-gray-300 px-3 py-1 rounded font-bold">+</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-yellow-50 p-2 rounded border border-yellow-200">
                        <span class="font-bold text-yellow-700">小美 (需 8)</span>
                        <div class="flex items-center">
                            <button class="bg-yellow-300 px-3 py-1 rounded font-bold">-</button>
                            <span class="mx-4 font-bold text-lg text-yellow-700">3</span>
                            <button class="bg-yellow-300 px-3 py-1 rounded font-bold">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
    // --- 畫面切換與基礎邏輯 ---
    function showView(viewId) {
        document.getElementById('login-view').classList.add('hidden-view');
        document.getElementById('user-view').classList.add('hidden-view');
        document.getElementById('admin-view').classList.add('hidden-view');
        document.getElementById(viewId).classList.remove('hidden-view');
    }

    // 模擬登入行為 (未來會串接 GAS)
    function login() {
        const name = document.getElementById('userName').value;
        if(name === '李阿饅') {
            showView('admin-view');
            document.getElementById('logoutBtn').classList.remove('hidden-view');
        } else if (name !== '') {
            showView('user-view');
            document.getElementById('logoutBtn').classList.remove('hidden-view');
        } else {
            document.getElementById('loginMessage').innerText = '請輸入姓名！';
        }
    }

    function logout() {
        document.getElementById('userName').value = '';
        document.getElementById('userPwd').value = '';
        showView('login-view');
        document.getElementById('logoutBtn').classList.add('hidden-view');
    }
</script>
</body>
</html>
